<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dokon.uz | Sotuv va Qidiruv Tizimi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f5f8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-50 bg-white border-b border-gray-100">
        <div class="container mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-4">
            <h1 class="text-2xl font-black text-[#7000ff]">dokon<span class="text-orange-500">.uz</span></h1>
            
            <div class="relative flex-1 max-w-xl mx-2">
                <input id="search-input" type="text" placeholder="Mahsulotlarni qidirish..." 
                       class="w-full bg-gray-100 border-none p-3 pl-10 rounded-2xl focus:ring-2 ring-[#7000ff] outline-none text-sm">
                <span class="absolute left-3 top-3 opacity-40">🔍</span>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="toggleAdmin()" class="text-xs font-bold text-gray-400 hover:text-[#7000ff] uppercase tracking-widest">Manager Mode</button>
                
                <div onclick="toggleCartModal()" class="bg-black text-white px-5 py-2.5 rounded-2xl flex items-center gap-3 cursor-pointer active:scale-95 transition shadow-xl relative">
                    <span class="text-xs font-bold uppercase">Savat</span>
                    <span id="cart-count" class="bg-[#7000ff] text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <div id="category-bar" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar mb-8"></div>

        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6"></div>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[200] hidden flex items-center justify-end">
        <div class="bg-white h-full w-full max-w-md p-8 shadow-2xl flex flex-col animate-in fade-in duration-300">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black">Savat</h2>
                <button onclick="toggleCartModal()" class="text-2xl text-gray-400 hover:text-black">✕</button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-4 pr-2">
                </div>
            <div class="pt-6 border-t border-gray-100 mt-4">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-gray-500 font-bold">Umumiy summa:</span>
                    <span id="cart-total" class="text-2xl font-black text-[#7000ff]">0 so'm</span>
                </div>
                <button onclick="checkoutToTelegram()" class="w-full bg-[#7000ff] text-white py-4 rounded-2xl font-bold text-lg hover:bg-black transition active:scale-95">
                    Hozir sotib olish
                </button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[32px] p-8 shadow-2xl">
            <h3 class="text-xl font-black mb-4">Tovar qo'shish</h3>
            <div class="space-y-3">
                <input id="p-name" type="text" placeholder="Nomi" class="w-full bg-gray-50 p-3 rounded-xl outline-none">
                <input id="p-price" type="number" placeholder="Narxi" class="w-full bg-gray-50 p-3 rounded-xl outline-none">
                <input id="p-category" type="text" placeholder="Bo'lim (masalan: Gadjeytlar)" class="w-full bg-gray-50 p-3 rounded-xl outline-none">
                <input id="p-image" type="text" placeholder="Rasm URL" class="w-full bg-gray-50 p-3 rounded-xl outline-none">
                <button onclick="saveProduct()" class="w-full bg-[#7000ff] text-white py-3 rounded-xl font-bold mt-2">Saqlash</button>
                <button onclick="toggleAdmin()" class="w-full bg-gray-100 text-gray-400 py-3 rounded-xl font-bold">Yopish</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
