<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dokon.uz | Bahorgi Chegirmalar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7fa; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-[100] bg-white shadow-sm border-b">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <h1 class="text-2xl font-black text-[#7000ff]">dokon<span class="text-orange-500">.uz</span></h1>
            <div class="flex items-center gap-6">
                <button onclick="openStaffLogin()" class="flex flex-col items-center">
                    <span class="text-xl">🔑</span><span class="text-[10px] font-bold uppercase">Ishchi paneli</span>
                </button>
                <div class="flex flex-col items-center relative">
                    <span class="text-xl">🛒</span><span class="text-[10px] font-bold">Savat</span>
                    <span id="cart-count" class="absolute -top-1 -right-2 bg-orange-500 text-white text-[10px] px-1.5 rounded-full">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="bg-gradient-to-r from-green-400 to-emerald-500 rounded-[30px] p-8 text-white h-44 flex flex-col justify-center relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-2xl font-black italic text-white uppercase tracking-tighter">🌸 BAHORGI CHEGIRMALAR</h2>
                    <p class="text-sm opacity-90">Barcha mahsulotlarga -30% gacha</p>
                    <button class="bg-white text-emerald-600 px-6 py-2 rounded-xl mt-4 font-black text-xs uppercase shadow-lg">KO'RISH</button>
                </div>
                <span class="absolute right-[-20px] bottom-[-20px] text-[150px] opacity-20 rotate-12">🌸</span>
            </div>
            <div class="bg-[#7000ff] rounded-[30px] p-8 text-white h-44 flex flex-col justify-center">
                <h2 class="text-2xl font-black italic uppercase">Tezkor Yetkazib Berish</h2>
                <p class="text-sm opacity-90">O'zbekiston bo'ylab 24 soat ichida! 🚚</p>
            </div>
        </div>

        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </main>

    <div id="staff-login-modal" class="fixed inset-0 bg-indigo-50/90 z-[500] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[45px] p-10 text-center shadow-2xl shadow-indigo-100 border border-white relative overflow-hidden">
            <div class="mb-8 flex flex-col items-center">
                <div class="w-16 h-16 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-full flex items-center justify-center shadow-xl shadow-indigo-100 mb-4">
                    <span class="text-3xl">🛠️</span>
                </div>
                <h3 class="text-2xl font-black text-slate-800 tracking-tight">Xodimlar <span class="text-indigo-500 italic">Markazi</span></h3>
                <p class="text-[10px] font-bold text-indigo-300 uppercase tracking-[3px] mt-1">Boshqaruv Tizimi</p>
            </div>

            <p class="text-gray-400 text-xs mb-6">Xizmat doirasida kirish uchun telefon raqamingizni kiriting</p>

            <div class="space-y-4">
                <div class="bg-gray-50 rounded-2xl p-4 flex items-center border border-gray-100 focus-within:border-indigo-400 transition-all">
                    <span class="font-bold text-gray-400 mr-2">+998</span>
                    <input id="staff-phone" type="tel" placeholder="90 504 08 11" class="bg-transparent outline-none w-full font-bold text-slate-700">
                </div>
                
                <button onclick="loginAsStaff()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 flex items-center justify-center gap-2 hover:bg-indigo-700 transition-all active:scale-95">
                    <span>🔑</span> Tizimga kirish
                </button>
            </div>

            <p class="text-[10px] text-gray-300 mt-10">© 2024–2026 dokon.uz Boshqaruv Markazi</p>
            <button onclick="closeStaffLogin()" class="absolute top-6 right-6 text-gray-300 hover:text-gray-500 text-xl">✕</button>
        </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-gray-50 z-[600] hidden overflow-y-auto p-4 md:p-8">
        </div>

    <script src="app.js"></script>
</body>
</html>
