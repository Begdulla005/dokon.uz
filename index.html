<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="LJmUiAq_CswqFoV4wweXbFCvkyEeMIrcJ3BJ7qXQeNg" />
    <title>dokon.uz | Professional Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; scroll-behavior: smooth; }
        .header-shadow { box-shadow: 0 2px 15px rgba(0,0,0,0.08); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .search-results { display: none; }
        .group:hover .search-results { display: block; }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-50 bg-white header-shadow">
        <div class="container mx-auto px-2 py-3 flex flex-col gap-3">
            <div class="flex items-center justify-between gap-4">
                <h1 onclick="location.reload()" class="text-xl font-black text-[#7000ff] cursor-pointer italic">dokon<span class="text-orange-500">.uz</span></h1>
                
                <div class="flex items-center gap-5">
                    <div id="user-status-btn" onclick="toggleLogin()" class="flex flex-col items-center cursor-pointer group">
                        <span class="text-xl group-hover:scale-110 transition">👤</span>
                        <span id="login-text" class="text-[10px] font-bold">Kirish</span>
                    </div>
                    <div class="flex flex-col items-center cursor-pointer group">
                        <span class="text-xl group-hover:scale-110 transition">❤️</span>
                        <span class="text-[10px] font-bold text-gray-500">Saralangan</span>
                    </div>
                    <div onclick="toggleCartModal()" class="flex flex-col items-center cursor-pointer group relative">
                        <span class="text-xl group-hover:scale-110 transition">🛒</span>
                        <span class="text-[10px] font-bold">Savat</span>
                        <span id="cart-count" class="absolute -top-1 -right-1 bg-orange-500 text-white text-[9px] px-1.5 rounded-full border-2 border-white font-bold">0</span>
                    </div>
                </div>
            </div>

            <div class="relative group">
                <div class="flex bg-gray-100 rounded-2xl items-center px-4 py-1 border-2 border-transparent focus-within:border-[#7000ff] focus-within:bg-white transition-all shadow-sm">
                    <input id="search-input" type="text" placeholder="Mahsulotlarni AI bilan izlang..." 
                           class="w-full bg-transparent p-2 outline-none text-sm font-medium" oninput="smartSearch(this.value)">
                    <span class="text-gray-400">🔍</span>
                </div>
                <div id="search-dropdown" class="search-results absolute top-full left-0 right-0 bg-white mt-2 rounded-2xl shadow-2xl border border-gray-100 z-[100] max-h-80 overflow-y-auto"></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-10">
            <div class="bg-gradient-to-br from-[#7000ff] to-[#4e00b3] rounded-[32px] p-8 h-52 flex flex-col justify-center text-white relative overflow-hidden group">
                <h2 class="text-3xl font-black z-10 leading-tight">RAMAZON<br>CHEGIRMALARI</h2>
                <button onclick="scrollToProducts()" class="bg-white text-[#7000ff] px-8 py-2.5 rounded-xl text-xs font-black mt-4 w-fit z-10 hover:invert transition">KO'RISH</button>
                <div class="absolute right-[-20px] bottom-[-20px] opacity-10 text-[140px] font-black italic group-hover:scale-110 transition duration-700">🌙</div>
            </div>
            
            <div class="bg-gradient-to-br from-[#00c9a7] to-[#00897b] rounded-[32px] p-8 h-52 flex flex-col justify-center text-white relative overflow-hidden group cursor-pointer" onclick="scrollToProducts()">
                <h2 class="text-3xl font-black z-10 leading-tight uppercase">Tezkor<br>Yetkazib berish</h2>
                <p class="text-xs opacity-90 z-10 mt-2 font-medium">O'zbekiston bo'ylab 24 soat ichida! 🚚</p>
                <button class="bg-white text-[#00897b] px-8 py-2.5 rounded-xl text-xs font-black mt-4 w-fit z-10 group-hover:bg-black group-hover:text-white transition">XARID QILISH</button>
                <div class="absolute right-[-40px] bottom-[-20px] opacity-20 text-[130px] group-hover:right-6 transition-all duration-1000">🚚</div>
            </div>
        </div>

        <div id="category-bar" class="flex gap-3 overflow-x-auto pb-6 no-scrollbar sticky top-[135px] bg-[#f8f9fa]/95 backdrop-blur-md z-40 py-2"></div>

        <div id="product-section">
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </div>
    </main>

    <div id="login-modal" class="fixed inset-0 bg-black/70 z-[300] hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[35px] p-10 relative shadow-2xl animate-in fade-in zoom-in duration-300">
            <button onclick="toggleLogin()" class="absolute top-6 right-8 text-gray-300 hover:text-black text-xl">✕</button>
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-purple-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="text-3xl">👤</span>
                </div>
                <h3 class="text-2xl font-black mb-2">Tizimga kirish</h3>
                <p class="text-sm text-gray-500 px-4">Buyurtma berish uchun telefon raqamingizni kiriting</p>
            </div>
            <div class="space-y-5">
                <div class="bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 flex items-center focus-within:border-[#7000ff] transition">
                    <span class="text-gray-400 font-bold mr-2 text-lg">+998</span>
                    <input id="user-phone" type="tel" placeholder="00 000 00 00" class="w-full bg-transparent outline-none font-bold text-lg tracking-wider">
                </div>
                <button id="login-submit-btn" onclick="sendCode()" class="w-full bg-[#7000ff] text-white py-4 rounded-2xl font-black text-lg shadow-lg hover:bg-[#5e00d9] transition active:scale-95">
                    Kirish
                </button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/50 z-[200] hidden flex items-center justify-end">
        <div class="bg-white h-full w-full max-w-md p-8 flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black">Savatcha</h2>
                <button onclick="toggleCartModal()" class="text-2xl text-gray-400">✕</button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-5 pr-2 no-scrollbar"></div>
            <div class="pt-8 border-t-2 border-gray-50 mt-4">
                <div class="flex justify-between text-xl font-black mb-6">
                    <span class="text-gray-500">Jami summaningiz:</span>
                    <span id="cart-total" class="text-[#7000ff]">0 so'm</span>
                </div>
                <button onclick="checkoutToTelegram()" class="w-full bg-[#7000ff] text-white py-5 rounded-[22px] font-black text-xl shadow-xl hover:shadow-purple-200 transition active:scale-95">
                    Sotib olish
                </button>
            </div>
        </div>
    </div>

    <button onclick="toggleAdmin()" class="fixed bottom-8 left-8 bg-black text-white w-14 h-14 rounded-full shadow-2xl z-50 font-bold text-2xl flex items-center justify-center hover:rotate-90 transition-all duration-500">+</button>
    
    <div id="admin-panel" class="fixed inset-0 bg-black/60 z-[400] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[35px] p-10">
            <h3 class="text-2xl font-black mb-6">Yangi mahsulot</h3>
            <div class="space-y-4">
                <input id="p-name" type="text" placeholder="Nomi" class="w-full bg-gray-50 p-4 rounded-2xl border-2 border-transparent focus:border-purple-400 outline-none">
                <input id="p-price" type="number" placeholder="Narxi" class="w-full bg-gray-50 p-4 rounded-2xl border-2 border-transparent focus:border-purple-400 outline-none">
                <input id="p-old-price" type="number" placeholder="Eski narxi" class="w-full bg-gray-50 p-4 rounded-2xl border-2 border-transparent focus:border-purple-400 outline-none">
                <input id="p-category" type="text" placeholder="Kategoriya" class="w-full bg-gray-50 p-4 rounded-2xl border-2 border-transparent focus:border-purple-400 outline-none">
                <input id="p-image" type="text" placeholder="Rasm URL" class="w-full bg-gray-50 p-4 rounded-2xl border-2 border-transparent focus:border-purple-400 outline-none">
                <button onclick="saveProduct()" class="w-full bg-black text-white py-4 rounded-2xl font-black text-lg">Saqlash</button>
                <button onclick="toggleAdmin()" class="w-full text-gray-400 font-bold text-sm mt-2">Bekor qilish</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
