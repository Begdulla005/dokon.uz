<div id="admin-panel" class="fixed inset-0 bg-gray-50 z-[400] hidden overflow-y-auto p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-black italic text-[#7000ff]">Boshqaruv Markazi</h2>
                <p id="user-role-display" class="text-xs font-bold text-gray-400 uppercase tracking-widest mt-1"></p>
            </div>
            <button onclick="toggleAdminPanel()" class="bg-white shadow-lg p-4 rounded-full hover:rotate-90 transition duration-300">✕</button>
        </div>

        <div id="section-stats" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10 hidden">
            <div class="bg-white p-8 rounded-[35px] shadow-sm border-b-4 border-purple-500">
                <p class="text-gray-400 text-[10px] font-black mb-1">UMUMIY SAVDO</p>
                <h3 id="stat-income" class="text-2xl font-black">0 so'm</h3>
            </div>
            <div class="bg-white p-8 rounded-[35px] shadow-sm border-b-4 border-green-500">
                <p class="text-gray-400 text-[10px] font-black mb-1">SOF FOYDA</p>
                <h3 id="stat-profit" class="text-2xl font-black text-green-600">0 so'm</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div id="section-add-product" class="hidden space-y-4">
                <div class="bg-white p-8 rounded-[35px] shadow-sm">
                    <h4 class="font-black mb-6 text-sm text-gray-400 uppercase">Yangi Mahsulot (Menejer)</h4>
                    <input id="p-name" placeholder="Nomi" class="w-full p-4 mb-3 bg-gray-50 rounded-2xl border-none outline-none focus:ring-2 ring-purple-400">
                    <input id="p-price" type="number" placeholder="Narxi" class="w-full p-4 mb-3 bg-gray-50 rounded-2xl border-none outline-none">
                    <input id="p-category" list="cats" placeholder="Kategoriya" class="w-full p-4 mb-5 bg-gray-50 rounded-2xl border-none outline-none">
                    <datalist id="cats">
                        <option value="Elektronika">
                        <option value="Kiyimlar">
                        <option value="Oziq-ovqat">
                    </datalist>
                    <button onclick="saveProduct()" class="w-full bg-[#7000ff] text-white py-4 rounded-2xl font-black shadow-lg shadow-purple-200">BAZAGA QO'SHISH</button>
                </div>
            </div>

            <div id="section-database" class="lg:col-span-2">
                <h4 class="font-black mb-6 text-xl">Tizim Ma'lumotlar Bazasi</h4>
                <div id="db-log-list" class="space-y-4 max-h-[600px] overflow-y-auto pr-4 no-scrollbar">
                    </div>
            </div>
        </div>
    </div>
</div>
