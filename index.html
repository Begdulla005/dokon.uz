<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dokon.uz | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            margin: 0; 
        }
        .nav-item.active { background: #4f46e5; color: white; }
        .card { background: #1e293b; border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 border-r border-slate-800 p-6 flex flex-col gap-8 bg-[#0a0f1d]">
        <div class="flex items-center gap-3 px-2">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center font-black text-white">D</div>
            <h1 class="text-xl font-extrabold text-white">dokon<span class="text-indigo-500">.uz</span></h1>
        </div>

        <nav class="flex flex-col gap-2 flex-grow text-sm font-semibold text-slate-400">
            <p class="text-[10px] uppercase tracking-widest text-slate-600 mb-2 px-2">Asosiy</p>
            <button onclick="switchPage('dashboard')" id="btn-dashboard" class="nav-item active p-3 flex items-center gap-3 rounded-xl transition-all w-full text-left">📊 Dashboard</button>
            <button onclick="switchPage('kassa')" id="btn-kassa" class="nav-item p-3 flex items-center gap-3 rounded-xl transition-all w-full text-left">🛒 Kassa (Sotuv)</button>
            <p class="text-[10px] uppercase tracking-widest text-slate-600 mt-6 mb-2 px-2">Boshqaruv</p>
            <button onclick="switchPage('mahsulotlar')" id="btn-mahsulotlar" class="nav-item p-3 flex items-center gap-3 rounded-xl transition-all w-full text-left">📦 Mahsulotlar</button>
            <button onclick="switchPage('mijozlar')" id="btn-mijozlar" class="nav-item p-3 flex items-center gap-3 rounded-xl transition-all w-full text-left">👥 Mijozlar</button>
        </nav>
    </aside>

    <main class="flex-grow flex flex-col overflow-hidden">
        <header class="p-6 border-b border-slate-800 flex justify-between items-center bg-[#0f172a]/80 backdrop-blur-md">
            <h2 id="page-title" class="text-xl font-black">Dashboard</h2>
            <div class="flex items-center gap-4">
                <span class="text-xs font-bold text-slate-500">Admin: Begdulla005</span>
                <div class="w-10 h-10 rounded-xl bg-indigo-600/10 border border-indigo-500/20 flex items-center justify-center font-bold text-indigo-500">B</div>
            </div>
        </header>

        <div class="p-8 overflow-y-auto flex-grow space-y-8">
            <div id="section-dashboard" class="page-section space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 text-white">
                    <div class="card p-6">
                        <p class="text-xs font-bold text-slate-500 uppercase">Umumiy Savdo</p>
                        <h3 id="stat-total-sales" class="text-2xl font-black mt-2">0 so'm</h3>
                    </div>
                </div>
                <div class="card p-6 h-80">
                    <canvas id="salesChart"></canvas>
                </div>
            </div>

            <div id="section-kassa" class="page-section hidden card p-8">
                <h3 class="text-xl font-bold mb-6">Sotuv Paneli</h3>
                <div class="flex gap-4 mb-6">
                    <select id="sale-product-select" class="bg-slate-900 border border-slate-700 p-4 rounded-xl outline-none text-white flex-grow">
                        <option value="">Mahsulotni tanlang...</option>
                    </select>
                    <button onclick="addToCart()" class="bg-indigo-600 px-8 rounded-xl font-black hover:bg-indigo-700 transition">SAVATGA QO'SHISH</button>
                </div>
                <div id="cart-list" class="space-y-2">
                    </div>
                <div class="mt-8 pt-6 border-t border-slate-800 flex justify-between items-center">
                    <h4 class="text-2xl font-black">Jami: <span id="cart-total">0</span> so'm</h4>
                    <button onclick="checkout()" class="bg-emerald-600 px-10 py-4 rounded-2xl font-black shadow-lg shadow-emerald-600/20">SOTUVNI YAKUNLASH</button>
                </div>
            </div>
            
            <div id="section-mijozlar" class="page-section hidden card p-8 text-center">
                <h3 class="text-xl font-bold mb-4">Mijozlar Bazasi</h3>
                <p class="text-slate-500 italic">Hozircha mijozlar mavjud emas.</p>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
