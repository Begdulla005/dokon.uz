<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dokon.uz | Sifatli Xarid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; background-color: #f4f7f9; }
        .banner-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .banner-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-gray-100">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between gap-4">
            <h1 onclick="location.reload()" class="text-2xl font-black text-[#7000ff] cursor-pointer tracking-tighter">dokon<span class="text-orange-500">.uz</span></h1>
            
            <div class="relative flex-1 max-w-2xl hidden md:block">
                <input id="search-input" type="text" placeholder="Mahsulotlarni qidirish..." 
                       class="w-full bg-gray-100 border-none p-3 pl-12 rounded-2xl focus:ring-2 ring-[#7000ff] outline-none text-sm transition-all">
                <span class="absolute left-4 top-3.5 opacity-30">🔍</span>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="toggleAdmin()" class="text-[10px] font-bold text-gray-400 hover:text-[#7000ff] uppercase">Admin</button>
                <div onclick="toggleCartModal()" class="bg-[#7000ff] text-white px-6 py-2.5 rounded-2xl flex items-center gap-3 cursor-pointer active:scale-95 transition shadow-lg shadow-purple-200">
                    <span class="text-xs font-bold uppercase tracking-wide">Savat</span>
                    <span id="cart-count" class="bg-white text-[#7000ff] text-[10px] px-2 py-0.5 rounded-full font-black">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-12">
            <div class="banner-card bg-gradient-to-br from-[#00c9a7] to-[#00897b] rounded-[40px] p-10 h-64 flex flex-col justify-center text-white relative overflow-hidden">
                <div class="z-10">
                    <span class="bg-white/20 text-[10px] font-bold px-3 py-1 rounded-full uppercase mb-4 inline-block">Mavsumiy Taklif</span>
                    <h2 class="text-4xl font-black mb-2 leading-none">BAHORGI<br>CHEGIRMALAR! 🌸</h2>
                    <p class="text-white/80 text-sm mb-6 max-w-[250px]">Barcha turdagi mahsulotlar uchun 40% gacha foyda!</p>
                    <button onclick="scrollToProducts()" class="bg-white text-[#00897b] px-8 py-3 rounded-2xl text-xs font-black uppercase hover:bg-black hover:text-white transition-colors shadow-xl">Batafsil ko'rish</button>
                </div>
                <div class="absolute right-[-10%] bottom-[-10%] opacity-10 text-[200px] font-black italic select-none">40%</div>
            </div>

            <div class="banner-card bg-gradient-to-br from-[#ff6b6b] to-[#ee5253] rounded-[40px] p-10 h-64 flex flex-col justify-center text-white relative overflow-hidden">
                <div class="z-10">
                    <span class="bg-white/20 text-[10px] font-bold px-3 py-1 rounded-full uppercase mb-4 inline-block">VIP Xizmat</span>
                    <h2 class="text-4xl font-black mb-2 leading-none">TEZKOR<br>YETKAZISH 🚚</h2>
                    <p class="text-white/80 text-sm mb-6 max-w-[250px]">Buyurtmangiz 24 soat ichida eshigingiz tagida bo'ladi.</p>
                    <button onclick="scrollToProducts()" class="bg-white text-[#ee5253] px-8 py-3 rounded-2xl text-xs font-black uppercase hover:bg-black hover:text-white transition-colors shadow-xl">Hozir xarid qilish</button>
                </div>
                <div class="absolute right-10 bottom-10 w-48 opacity-10">
                    <svg fill="white" viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>
                </div>
            </div>
        </div>

        <div id="category-bar" class="flex gap-3 overflow-x-auto pb-6 no-scrollbar sticky top-20 bg-[#f4f7f9]/80 backdrop-blur-md z-40 py-2"></div>

        <div id="product-section" class="pt-4">
            <h2 class="text-2xl font-black mb-8 flex items-center gap-3">
                <span class="w-2 h-8 bg-[#7000ff] rounded-full"></span>
                Mashhur mahsulotlar
            </h2>
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
        </div>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-black/40 backdrop-blur-md z-[200] hidden flex items-center justify-end transition-all">
        <div class="bg-white h-full w-full max-w-md p-8 shadow-2xl flex flex-col animate-in slide-in-from-right duration-300">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black tracking-tight">Savatchangiz</h2>
                <button onclick="toggleCartModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 hover:bg-red-50 hover:text-red-500 transition">✕</button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-4 pr-2 custom-scrollbar"></div>
            <div class="pt-8 border-t border-gray-100 mt-6">
                <div class="flex justify-between items-center mb-8">
                    <span class="text-gray-400 font-bold uppercase text-[10px] tracking-widest">Umumiy To'lov:</span>
                    <span id="cart-total" class="text-3xl font-black text-[#7000ff]">0 so'm</span>
                </div>
                <button onclick="checkoutToTelegram()" class="w-full bg-[#7000ff] text-white py-5 rounded-[24px] font-black text-lg hover:bg-black transition-all shadow-2xl shadow-purple-200 active:scale-95">
                    Buyurtmani Tasdiqlash
                </button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-10 shadow-2xl">
            <h3 class="text-2xl font-black mb-6">Yangi Mahsulot</h3>
            <div class="space-y-4">
                <input id="p-name" type="text" placeholder="Mahsulot nomi" class="w-full bg-gray-50 p-4 rounded-2xl outline-none border focus:border-purple-300 transition">
                <div class="grid grid-cols-2 gap-4">
                    <input id="p-old-price" type="number" placeholder="Eski narxi" class="w-full bg-gray-50 p-4 rounded-2xl outline-none border">
                    <input id="p-price" type="number" placeholder="Yangi narxi" class="w-full bg-gray-50 p-4 rounded-2xl outline-none border">
                </div>
                <input id="p-category" type="text" placeholder="Kategoriya (Telefon, Kiyim...)" class="w-full bg-gray-50 p-4 rounded-2xl outline-none border">
                <input id="p-image" type="text" placeholder="Rasm URL manzili" class="w-full bg-gray-50 p-4 rounded-2xl outline-none border">
                <button onclick="saveProduct()" class="w-full bg-[#7000ff] text-white py-4 rounded-2xl font-black mt-4 hover:bg-black transition">Bazada Saqlash</button>
                <button onclick="toggleAdmin()" class="w-full text-gray-400 font-bold py-2 text-sm">Yopish</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
