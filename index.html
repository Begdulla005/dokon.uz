<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dokon.uz | Uzum Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f2f4f7; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-lg border-b border-gray-200">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-extrabold text-[#7000ff] tracking-tighter">dokon<span class="text-orange-500">.uz</span></h1>
            
            <div class="flex items-center gap-4">
                <button onclick="toggleAdmin()" class="text-sm font-bold text-gray-500 hover:text-[#7000ff]">Manager Mode</button>
                <div class="bg-[#1f2937] text-white px-5 py-2 rounded-2xl flex items-center gap-3 shadow-lg cursor-pointer active:scale-95 transition">
                    <span class="text-xs font-bold uppercase">Savat</span>
                    <span id="cart-count" class="bg-[#7000ff] text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <div id="category-bar" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar mb-6">
            </div>

        <div class="w-full h-48 md:h-64 bg-gradient-to-r from-[#7000ff] to-[#b700ff] rounded-[32px] mb-8 flex items-center p-8 text-white relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-3xl md:text-5xl font-black mb-2 uppercase tracking-tight">WOW TOVARLAR</h2>
                <p class="text-lg opacity-90">Foyda bilan buyurtma qiling!</p>
            </div>
            <div class="absolute right-[-20px] bottom-[-20px] opacity-20 text-[150px] font-black italic select-none">SALE</div>
        </div>

        <div class="mb-6 flex items-center gap-2">
            <h2 class="text-xl font-bold text-gray-800">Mashhur mahsulotlar</h2>
            <span class="text-gray-400 text-xl font-light">›</span>
        </div>

        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6">
            </div>
    </main>

    <div id="admin-panel" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[32px] p-8 shadow-2xl relative">
            <button onclick="toggleAdmin()" class="absolute top-6 right-6 text-gray-400 hover:text-black text-xl">✕</button>
            <h2 class="text-2xl font-black mb-6 text-gray-800 tracking-tight">Yangi mahsulot qo'shish</h2>
            
            <div class="space-y-4">
                <input id="p-name" type="text" placeholder="Mahsulot nomi" class="w-full bg-gray-50 border border-gray-100 p-4 rounded-2xl outline-none focus:ring-2 ring-[#7000ff] transition">
                
                <div class="grid grid-cols-2 gap-3">
                    <input id="p-price" type="number" placeholder="Hozirgi narx" class="w-full bg-gray-50 border border-gray-100 p-4 rounded-2xl outline-none focus:ring-2 ring-[#7000ff] transition">
                    <input id="p-old-price" type="number" placeholder="Eski narx (chegirma uchun)" class="w-full bg-gray-50 border border-gray-100 p-4 rounded-2xl outline-none focus:ring-2 ring-[#7000ff] transition">
                </div>

                <input id="p-category" type="text" placeholder="Bo'lim nomi (masalan: Gadjeytlar)" class="w-full bg-gray-50 border border-gray-100 p-4 rounded-2xl outline-none focus:ring-2 ring-[#7000ff] transition">
                
                <input id="p-image" type="text" placeholder="Rasm URL havolasi" class="w-full bg-gray-50 border border-gray-100 p-4 rounded-2xl outline-none focus:ring-2 ring-[#7000ff] transition">
                
                <button onclick="saveProduct()" class="w-full bg-[#7000ff] text-white py-4 rounded-2xl font-bold shadow-xl shadow-purple-200 hover:bg-[#5e00d6] transition active:scale-95 mt-2">
                    Bazaga qo'shish
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
