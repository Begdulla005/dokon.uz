<!-- index.html ichida, sotuv paneli qismiga -->
<div class="sotuv-panel">
  <h2>Sotuv Paneli</h2>
  
  <div class="add-product">
    <input 
      list="product-list" 
      id="product-select" 
      placeholder="Mahsulotni tanlang yoki qidiring..." 
      autocomplete="off"
    />
    <datalist id="product-list">
      <!-- JS orqali dinamik to'ldiramiz -->
    </datalist>
    
    <button id="add-to-cart" class="btn-add">SAVATGA QO'SHISH</button>
  </div>

  <div class="cart">
    <h3>Savat</h3>
    <div id="cart-items">
      <!-- JS orqali mahsulotlar chiqadi -->
      <p class="empty-cart">Savat bo'sh</p>
    </div>
    
    <div class="total">
      <strong>Jami:</strong> 
      <span id="total-amount">0 so'm</span>
    </div>
    
    <button id="finish-sale" class="btn-finish">SOTUVNI YAKUNLASH</button>
  </div>
</div>
