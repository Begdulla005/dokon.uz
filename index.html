<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dokon.uz | Sifatli Xarid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        /* Bannerlar balandligini bir xil qilish */
        .banner-h { height: 180px; }
        @media (min-width: 768px) { .banner-h { height: 220px; } }
    </style>
</head>
<body class="pb-10">

    <header class="sticky top-0 z-[100] bg-white border-b border-gray-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <h1 class="text-xl md:text-2xl font-black text-[#7000ff]">dokon<span class="text-orange-500">.uz</span></h1>
            
            <div class="flex items-center gap-4 md:gap-8">
                <button onclick="openStaffLogin()" class="flex flex-col items-center group">
                    <span class="text-xl group-hover:scale-110 transition">🔑</span>
                    <span class="text-[9px] font-bold uppercase text-gray-400">Ishchi Paneli</span>
                </button>
                <div class="flex flex-col items-center relative cursor-pointer">
                    <span class="text-xl">🛒</span>
                    <span class="text-[9px] font-bold text-gray-400 uppercase">Savat</span>
                    <span id="cart-badge" class="absolute -top-1 -right-2 bg-orange-500 text-white text-[10px] px-1.5 rounded-full border-2 border-white font-bold">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10">
            <div class="banner-h bg-[#10d481] rounded-[28px] p-6 md:p-8 text-white relative overflow-hidden flex flex-col justify-center">
                <div class="relative z-10">
                    <h2 class="text-xl md:text-3xl font-black italic uppercase leading-none mb-2">🌸 Bahorgi <br> Chegirmalar</h2>
                    <p class="text-[10px] md:text-xs font-bold opacity-90 mb-4">Barcha mahsulotlarga -30% gacha</p>
                    <button class="bg-white text-[#10d481] px-5 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg hover:bg-gray-100 transition">Ko'rish</button>
                </div>
                <span class="absolute right-[-10px] bottom-[-20px] text-[120px] md:text-[160px] opacity-20 rotate-12">🌸</span>
            </div>

            <div class="banner-h bg-[#7000ff] rounded-[28px] p-6 md:p-8 text-white relative overflow-hidden flex flex-col justify-center">
                <div class="relative z-10">
                    <h2 class="text-xl md:text-3xl font-black italic uppercase leading-none mb-2">Tezkor <br> Yetkazib Berish</h2>
                    <p class="text-[10px] md:text-xs font-bold opacity-90 mb-4">O'zbekiston bo'ylab 24 soat ichida! 🚚</p>
                    <button class="bg-white text-[#7000ff] px-5 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg hover:bg-gray-100 transition">Xarid Qilish</button>
                </div>
                <div class="absolute -right-4 bottom-4 opacity-10 w-32 md:w-48">
                    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>
                </div>
            </div>
        </div>

        <div id="product-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            </div>
    </main>

    <div id="staff-modal" class="fixed inset-0 bg-gray-900/60 z-[200] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-[360px] rounded-[40px] p-8 text-center shadow-2xl relative">
            <div class="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-2xl">🛠️</span>
            </div>
            <h3 class="text-xl font-black text-slate-800">Tizimga kirish</h3>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1 mb-8">Ishchi paneli</p>
            
            <div class="space-y-4">
                <div class="bg-gray-50 border border-gray-100 rounded-2xl p-4 flex items-center">
                    <span class="font-bold text-gray-400 mr-2">+998</span>
                    <input id="login-phone" type="tel" placeholder="90 504 08 11" class="w-full bg-transparent outline-none font-bold text-slate-700">
                </div>
                <button onclick="handleStaffLogin()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black shadow-lg shadow-indigo-100 active:scale-95 transition">KIRISH</button>
            </div>
            <button onclick="closeStaffLogin()" class="absolute top-6 right-6 text-gray-300 hover:text-gray-600">✕</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
